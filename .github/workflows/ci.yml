name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install
      - run: npm run build
      - run: npm test
      - run: node templates/phaser-2d/scripts/generate-placeholders.mjs
      - run: npm run validate
      - run: npx playwright install chromium --with-deps
      - run: npm run playtest
